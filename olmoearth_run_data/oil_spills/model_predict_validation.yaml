model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.singletask.SingleTaskModel
      init_args:
        encoder:
        - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
            patch_size: 4
            model_id: OLMOEARTH_V1_BASE
            embedding_size: 768
        decoder:
        - class_path: rslearn.models.unet.UNetDecoder
          init_args:
            in_channels:
            - - 4
              - 768
            out_channels: 2
            conv_layers_per_resolution: 1
        - class_path: rslearn.train.tasks.segmentation.SegmentationHead
    scheduler:
      class_path: rslearn.train.scheduler.PlateauScheduler
      init_args:
        factor: 0.2
        patience: 2
        min_lr: 0.0
        cooldown: 10
    optimizer:
      class_path: rslearn.train.optimizer.AdamW
      init_args:
        lr: 0.0001
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: ${DATASET_PATH}
    batch_size: 32
    num_workers: 4
    inputs:
      sentinel1:
        data_type: raster
        layers:
        - sentinel1
        bands:
        - vv
        - vh
        dtype: FLOAT32
        passthrough: true
        load_all_layers: true
      targets:
        data_type: raster
        layers:
        - label
        bands:
        - label
        dtype: INT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        num_classes: 2
        nodata_value: 255
        metric_kwargs:
          average: micro
    default_config:
      patch_size: 128
      transforms:
      - class_path: rslearn.train.transforms.sentinel1.Sentinel1ToDecibels
        init_args:
          selectors:
          - sentinel1
      - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
        init_args:
          band_names:
            sentinel1:
            - vv
            - vh
    predict_config:
      tags:
        split: val
      patch_size: 128
      load_all_patches: false
      skip_targets: false
      transforms:
      - class_path: rslearn.train.transforms.sentinel1.Sentinel1ToDecibels
        init_args:
          selectors:
          - sentinel1
      - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
        init_args:
          band_names:
            sentinel1:
            - vv
            - vh
trainer:
  callbacks:
  - class_path: rslearn.train.prediction_writer.RslearnWriter
    init_args:
      path: ${DATASET_PATH}
      output_layer: output
